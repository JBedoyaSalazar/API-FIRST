openapi: 3.1.1
info:
  title: "API First"
  version: "1.0.0"
  description: "Creando una API FIRST con el curso de platzi"
servers:
  - url: "http://localhost:3000"
    description: "Local server"
paths:
  /hello:
    get:
      summary: Hello World
      responses:
        200:
          description: "A succesful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HelloResponse"
components:
  schemas:
    HelloResponse:
      type: object
