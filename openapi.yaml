openapi: 3.1.1
info:
  title: "API First"
  version: "1.0.0"
  description: "Creando una API FIRST con el curso de platzi"
servers:
  - url: "http://localhost:3000"
    description: "Local server"

components:
  schemas:

    RootResponse:
      type: string

    HelloResponse:
      type: object

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        age:
          type: integer
        email:
          type: string
          format: email

    CreateUserRequest:
      type: object
      required:
        - name
        - age
        - email
      properties:
        name:
          type: string
          description: Nombre del usuario
          minLength: 2

        age:
          type: integer
          description: Edad del usuario
          minimum: 18
          maximum: 120

        email:
          type: string
          description: Correo electrónico
          format: email

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          description: Nombre del usuario
          minLength: 2

        age:
          type: integer
          description: Edad del usuario
          minimum: 18
          maximum: 120

        email:
          type: string
          description: Correo electrónico
          format: email

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        code:
          type: string

    Product:
      type: object
      required:
        - name
        - category
        - price
        - inStock
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 2
          maxLength: 40
          description: Nombre del producto
        description:
          type: string
          maxLength: 200
          description: Descripción del producto
        category:
          $ref: "#/components/schemas/ProductCategory"
        price:
          type: number
          multipleOf: 0.01
          exclusiveMinimum: 0
          description: Precio del producto
        tags:
          type: array
          items:
            type: string
          minItems: 1
          uniqueItems: true
          description: Tags del producto
        inStock:
          type: boolean
          description: Indica si el producto está en stock
        specifications:
          type: object
          additionalProperties:
            type: string
          description: Especificaciones del producto
        ratings:
          type: array
          items:
            $ref: "#/components/schemas/Rating"

    ProductCategory:
      type: string
      enum:
        - Electrónica
        - Ropa
        - Hogar
        - Deportes
        - Juguetes

    Rating:
      type: object
      required:
        - score
        - comment
      properties:
        score:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          maxLength: 255

    CreateProductRequest:
      type: object
      required:
        - name
        - category
        - price
        - inStock
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 40
          description: Nombre del producto
        description:
          type: string
          maxLength: 200
          description: Descripción del producto
        category:
          $ref: "#/components/schemas/ProductCategory"
        price:
          type: number
          multipleOf: 0.01
          exclusiveMinimum: 0
          description: Precio del producto
        tags:
          type: array
          items:
            type: string
          minItems: 1
          uniqueItems: true
          description: Tags del producto
        inStock:
          type: boolean
          description: Indica si el producto está en stock
        specifications:
          type: object
          additionalProperties:
            type: string
          description: Especificaciones del producto

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 40
          description: Nombre del producto
        description:
          type: string
          maxLength: 200
          description: Descripción del producto
        category:
          $ref: "#/components/schemas/ProductCategory"
        price:
          type: number
          multipleOf: 0.01
          exclusiveMinimum: 0
          description: Precio del producto
        tags:
          type: array
          items:
            type: string
          minItems: 1
          uniqueItems: true
          description: Tags del producto
        inStock:
          type: boolean
          description: Indica si el producto está en stock
        specifications:
          type: object
          additionalProperties:
            type: string
          description: Especificaciones del producto

paths:
  /: 
    get:
      summary: Welcome
      responses:
        200:
          description: "A succesful response"
          content:
            text/html:
              schema:
                $ref: "#/components/schemas/RootResponse"
  
  /hello:
    get:
      summary: Hello World
      responses:
        200:
          description: "A succesful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HelloResponse"
  
  /users:
    post:
      summary: Crea un usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        201:
          description: "Usuario creado exitosamente"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  
  /users/{id}:
    get:
      summary: Obtiene un usuario por id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Id del usuario
      responses:
        200:
          description: "Usuario obtenido exitosamente"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        404:
          description: "Usuario no encontrado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      summary: Actualiza parcialmente un usuario
      parameters:
        - in: path
          name: id
          required: true
          description: Id del usuario
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        200:
          description: Usuario actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        404:
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products:
    get:
      summary: Obtiene todos los productos
      responses:
        200:
          description: Listado de productos obtenido exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      summary: Crea un producto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        201:
          description: Producto creado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      summary: Obtiene un producto por id
      parameters:
        - in: path
          name: id
          required: true
          description: Id del producto
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Producto obtenido exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        404:
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      summary: Reemplaza completamente un producto
      parameters:
        - in: path
          name: id
          required: true
          description: Id del producto
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        200:
          description: Producto reemplazado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        404:
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      summary: Actualiza parcialmente un producto
      parameters:
        - in: path
          name: id
          required: true
          description: Id del producto
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        200:
          description: Producto actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        404:
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      summary: Elimina un producto
      parameters:
        - in: path
          name: id
          required: true
          description: Id del producto
          schema:
            type: string
            format: uuid
      responses:
        204:
          description: Producto eliminado exitosamente (sin contenido)
        404:
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"